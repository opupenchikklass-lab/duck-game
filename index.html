        document.getElementById('duck-tap-area').onclick = function() {
            if (corn <= 0) {
                tg.showAlert("Корм закончился! Открывай яйца.");
                return;
            }

            corn--;
            totalFed++;

            if (totalFed >= lvls[level] && level < 6) {
                level++;
                tg.HapticFeedback.notificationOccurred('success');
            }

            if (inventory.length < 16) {
                inventory.push(0);
                if (level === 1 && inventory.length < 16) inventory.push(0);
            }

            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        };

        function changeTab(t) {
            document.getElementById('screen-farm').style.display = t === 'farm' ? 'flex' : 'none';
            document.getElementById('screen-merge').style.display = t === 'merge' ? 'flex' : 'none';
            document.getElementById('nav-f').classList.toggle('active', t === 'farm');
            document.getElementById('nav-m').classList.toggle('active', t === 'merge');
            if (t === 'merge') renderGrid();
        }

        function renderGrid() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                if (inventory[i] !== undefined) {
                    s.innerHTML = <span>${skins[inventory[i]]}</span><div class="open-btn" onclick="openEgg(event, ${i})">OPEN</div>;
                }
                g.appendChild(s);
            }
        }

        function openEgg(e, i) {
            e.stopPropagation();
            let eggLvl = inventory[i];
            let isJack = Math.random() < 0.05;
            let win = isJack ? jacks[eggLvl] : rew[eggLvl];

            corn += win;
            inventory.splice(i, 1);
            if (isJack) tg.showAlert("🔥 ДЖЕКПОТ! +" + win + " 🌽");
            updateUI();
            renderGrid();
        }

        function updateUI() {
            document.getElementById('ui-corn').innerText = corn;
            document.getElementById('ui-eggs').innerText = inventory.length;
            document.getElementById('ui-lvl').innerText = level;
            document.getElementById('ui-fed').innerText = totalFed;
            document.getElementById('ui-next').innerText = lvls[level] || "MAX";
            let p = (totalFed / lvls[level]) * 100;
            document.getElementById('bar-fill').style.width = Math.min(p, 100) + "%";
        }

        updateUI();
    </script>
