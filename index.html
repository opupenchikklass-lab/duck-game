        function initGrid() {
            const grid = document.getElementById('egg-grid');
            grid.innerHTML = '';
            state.eggs.forEach((egg, idx) => {
                const slot = document.createElement('div');
                slot.className = 'egg-slot' + (egg ? '' : ' empty');
                slot.innerText = egg || '';
                slot.onclick = () => collectEgg(idx);
                grid.appendChild(slot);
            });
        }

        function collectEgg(idx) {
            if (state.eggs[idx]) {
                state.eggs[idx] = null; // "Забираем" яйцо
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                initGrid();
                // Через 3 секунды яйцо "респавнится" (для теста механики)
                setTimeout(() => {
                    state.eggs[idx] = Math.random() > 0.7 ? '💎' : '🥚';
                    initGrid();
                }, 3000);
            }
        }

        function feedAction(e) {
            if (state.corn <= 0) return;

            state.corn--;
            state.money += 0.02;
            state.xp++;

            if (state.xp >= state.xpMax) {
                state.xp = 0;
                state.lvl++;
                state.xpMax = Math.floor(state.xpMax * 1.2);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }

            createPop(e);
            updateUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function createPop(e) {
            const p = document.createElement('div');
            p.className = 'plus-pop';
            p.innerText = '+0.02';
            p.style.left = (e.clientX || window.innerWidth/2) + 'px';
            p.style.top = (e.clientY || window.innerHeight/2) + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        function updateUI() {
            document.getElementById('corn-val').innerText = state.corn;
            document.getElementById('balance-val').innerText = state.money.toFixed(2);
            document.getElementById('lvl-txt').innerText = 'LVL ' + state.lvl;
            document.getElementById('xp-num').innerText = state.xp + '/' + state.xpMax;
            document.getElementById('xp-fill').style.width = (state.xp / state.xpMax * 100) + '%';
        }

        updateUI();
        initGrid();
    </script>
