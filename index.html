<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: Arial; user-select: none; }
        .score { font-size: 30px; margin-top: 20px; color: #ffd700; }
        .duck-container { margin-top: 50px; cursor: pointer; transition: transform 0.1s; }
        .duck-container:active { transform: scale(0.95); }
        .duck-img { width: 250px; border-radius: 20px; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
    </style>
</head>
<body>
    <div class="score">🌽 <span id="balance">100</span></div>
    <div class="duck-container" onclick="clickDuck()">
        <img src="duck-dapper.png" class="duck-img">
    </div>
    <p>Жми на джентльмена!</p>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        let balance = 100;
        const balanceEl = document.getElementById('balance');

        function clickDuck() {
            balance += 1;
            balanceEl.innerText = balance;
            
            // Вибрация телефона при клике
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }
    </script>
</body>
</html>
