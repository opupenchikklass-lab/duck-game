<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TEST</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #clicker { width: 200px; height: 200px; background: blue; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="clicker">🦆</div>
    <div id="counter" style="font-size: 30px; margin-top: 20px;">0</div>

    <script>
        let count = 0;
        document.getElementById('clicker').onclick = function() {
            count++;
            document.getElementById('counter').innerText = count;
            console.log("Клик сработал!");
        };
    </script>
</body>
</html>
