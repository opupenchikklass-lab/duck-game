    <script>
        const tg = window.Telegram.WebApp;

        let corn = 100;
        let totalFed = 0;

[22.03.2026 17:31] ❤️: function handleTap() {
            if (corn <= 0) {
                tg.showAlert("Корм закончился! Открывай яйца в инвентаре.");
                return;
            }

            corn--;
            totalFed++;

            // Проверка уровня
            if (totalFed >= levels[level] && level < 6) {
                level++;
                tg.HapticFeedback.notificationOccurred('success');
            }

            // Добавляем 2 яйца на 1 уровне
            if (inventory.length < 16) {
                inventory.push(0);
                if (level === 1 && inventory.length < 16) inventory.push(0);
            }

            updateUI();
            tg.HapticFeedback.impactOccurred('light');
        }

        function showTab(t) {
            document.getElementById('screen-farm').style.display = t === 'farm' ? 'flex' : 'none';
            document.getElementById('screen-merge').style.display = t === 'merge' ? 'flex' : 'none';
            document.getElementById('btn-farm').classList.toggle('active', t === 'farm');
            document.getElementById('btn-merge').classList.toggle('active', t === 'merge');
            if (t === 'merge') renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                if (inventory[i] !== undefined) {
                    slot.innerHTML = <span>${eggSkins[inventory[i]]}</span>
                                      <div class="open-btn" onclick="openEgg(event, ${i})">OPEN</div>;
                }
                container.appendChild(slot);
            }
        }

        function openEgg(e, idx) {
            e.stopPropagation();
            const eggLvl = inventory[idx];
            const isJackpot = Math.random() < 0.05;
            const win = isJackpot ? jackpots[eggLvl] : rewards[eggLvl];

            corn += win;
            inventory.splice(idx, 1);
            if (isJackpot) tg.showAlert("🔥 ДЖЕКПОТ! +" + win + " 🌽");
            updateUI();
            renderGrid();
        }

        function updateUI() {
            document.getElementById('ui-corn').innerText = corn;
            document.getElementById('ui-eggs').innerText = inventory.length;
            document.getElementById('ui-lvl').innerText = level;
            document.getElementById('ui-fed').innerText = totalFed;
            document.getElementById('ui-next').innerText = levels[level] || "MAX";
            let p = (totalFed / levels[level]) * 100;
            document.getElementById('bar-fill').style.width = Math.min(p, 100) + "%";
        }
        updateUI();
    </script>
