        #duck-img { width: 100%; border-radius: 25px; transition: transform 0.05s; }
        .duck-box:active #duck-img { transform: scale(0.94); }

        /* ИНВЕНТАРЬ (СЕТКА) */

<body>

    <div class="header">
        <div>🌽 <span id="u-corn">100</span></div>
        <div>🥚 <span id="u-eggs">0</span></div>

    <div id="screen-farm">
        <div style="color: orange; margin-bottom: 10px; font-weight: bold;">LEVEL <span id="u-lvl">1</span></div>
        <div class="duck-box" onclick="tapDuck()">
            <img src="duck-dapper.png" class="duck-img" alt="Duck Gang">
        </div>
        <p style="color: #666; margin-top: 15px;">Жми на джентльмена!</p>

        <div class="grid" id="grid"></div>
    </div>

    <div class="footer">
        <div id="n-f" class="nav active" onclick="tab('farm')">УТКА</div>
        <div id="n-i" class="nav" onclick="tab('inv')">ЯЙЦЯ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let corn = 100, fed = 0, lvl = 1, inv = [];
        let sel = null;

        const skins = ['🥚', '✨', '💎', '🏺', '👑', '🔥', '🌈', '🌙', '☀️', '💠'];
        const prizes = [5, 20, 50, 150, 400, 1000, 3000, 8000, 20000, 50000];

        function tapDuck() {
            if (corn <= 0) { tg.showAlert("Корм кончился! Открывай яйца."); return; }
            corn--; fed++;
            if (fed >= (lvl * 1000)) { lvl++; tg.HapticFeedback.notificationOccurred('success'); }
            if (inv.length < 16) {
                inv.push(0);
                if (lvl === 1 && inv.length < 16) inv.push(0);
            }
            update();
            tg.HapticFeedback.impactOccurred('light');
        }

        function tab(t) {

            document.getElementById('screen-inv').style.display = t === 'inv' ? 'flex' : 'none';
            document.getElementById('n-f').classList.toggle('active', t === 'farm');
            document.getElementById('n-i').classList.toggle('active', t === 'inv');
            if (t === 'inv') draw();
        }

        function draw() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const s = document.createElement('div');
                s.className = 'slot' + (sel === i ? ' selected' : '');
                if (inv[i] !== undefined) {
                    s.innerHTML = <span class="lvl-badge">${inv[i]+1}</span>
                                   <span>${skins[inv[i]]}</span>
                                   <button class="open-btn" onclick="openE(event,${i})">OPEN</button>;
                    s.onclick = () => select(i);
                }
                g.appendChild(s);
            }
        }

        function select(i) {
            if (sel === null) { sel = i; }
            else if (sel === i) { sel = null; }
            else {
                if (inv[sel] === inv[i] && inv[i] < 9) {
                    inv[i]++; inv.splice(sel, 1); sel = null;
                    tg.HapticFeedback.notificationOccurred('success');
                } else { sel = i; }
            }
            draw();
        }

        function openE(e, i) {
            e.stopPropagation();
            let win = prizes[inv[i]];
            if (Math.random() < 0.05) { win *= 5; tg.showAlert("🔥 ДЖЕКПОТ: " + win + " 🌽!"); }
            corn += win; inv.splice(i, 1); sel = null;
            update(); draw();
        }

        function update() {
            document.getElementById('u-corn').innerText = corn;
            document.getElementById('u-eggs').innerText = inv.length;
            document.getElementById('u-lvl').innerText = lvl;
        }
        update();
    </script>
