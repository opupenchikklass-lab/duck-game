        .grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;

            width: 90vw; max-width: 350px; border: 1px solid rgba(255,255,255,0.05);

            aspect-ratio: 1/1; background: rgba(255,255,255,0.05); border-radius: 12px;

        .slot.selected { background: rgba(255,165,0,0.2); border: 2px solid #ffa500; }
        .slot:active { transform: scale(0.95); }

        /* ГЛАВНЫЙ ЭКРАН С УТКОЙ */

        /* НИЖНЕЕ МЕНЮ */

            display: flex; justify-content: space-around; padding: 10px 0 30px;

        .nav-item { opacity: 0.5; font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { opacity: 1; color: #ffa500; }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }

        .floating-text { position: absolute; animation: up 0.6s forwards; pointer-events: none; font-weight: bold; }

<body>

    <div class="header">
        <div class="stat-item">🔥 ЗГРАЯ</div>
        <div class="stat-item">🌽 <span id="corn">100</span></div>
        <div class="stat-item">🥚 <span id="egg-count">0</span></div>
    </div>

    <div id="farm-screen">
        <div style="font-size: 40px; font-weight: 900; margin-bottom: 20px;" id="main-score">0</div>
        <img id="duck" src="duck-dapper.png" onclick="tapDuck(event)">
        <div style="margin-top: 20px; background: #fff; color: #000; padding: 10px 25px; border-radius: 20px; font-weight: bold;">TAP TO FARM</div>
    </div>

    <div id="merge-screen" style="display: none;">
        <h3 style="margin-bottom: 15px; color: #ffa500;">EGG INVENTORY</h3>
        <div class="grid" id="grid"></div>
        <p style="font-size: 12px; color: #555; margin-top: 15px;">Нажми на два одинаковых яйца, чтобы объединить</p>
    </div>

    <div class="footer">
        <div class="nav-item" onclick="showScreen('farm')">
            <span class="nav-icon">📈</span>РИНОК
        </div>
        <div class="nav-item active" id="nav-farm" onclick="showScreen('farm')">
            <span class="nav-icon">🦆</span>КАЧКИ
        </div>
        <div class="nav-item" id="nav-merge" onclick="showScreen('merge')">
            <span class="nav-icon">🥚</span>ЯЙЦЯ
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
[22.03.2026 17:02] ❤️: let corn = 100;
        let eggs = []; // Массив индексов уровней яиц
        let selectedSlot = null;

        const eggSkins = ['🥚', '🥚', '✨', '💎', '🏺', '👑', '🔥', '🌈'];

        function tapDuck(e) {
            if (corn <= 0) return;
            corn--;
            
            // На 1 уровне даем 2 яйца
            eggs.push(0, 0); 
            
            updateUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            
            const txt = document.createElement('div');
            txt.className = 'floating-text';
            txt.innerText = '+2 🥚';
            txt.style.left = e.clientX + 'px';
            txt.style.top = e.clientY + 'px';
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 600);
        }

        function showScreen(type) {
            document.getElementById('farm-screen').style.display = type === 'farm' ? 'flex' : 'none';
            document.getElementById('merge-screen').style.display = type === 'merge' ? 'flex' : 'none';
            
            document.getElementById('nav-farm').classList.toggle('active', type === 'farm');
            document.getElementById('nav-merge').classList.toggle('active', type === 'merge');
            
            if (type === 'merge') renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot' + (selectedSlot === i ? ' selected' : '');
                slot.innerText = eggs[i] !== undefined ? eggSkins[eggs[i]] : '';
                slot.onclick = () => handleSlotClick(i);
                grid.appendChild(slot);
            }
        }

        function handleSlotClick(i) {
            if (eggs[i] === undefined) {
                selectedSlot = null;
            } else if (selectedSlot === null) {
                selectedSlot = i;
            } else if (selectedSlot === i) {
                selectedSlot = null;
            } else {
                // Пытаемся объединить
                if (eggs[selectedSlot] === eggs[i] && eggs[i] < eggSkins.length - 1) {
                    eggs[i]++; // Повышаем уровень
                    eggs.splice(selectedSlot, 1); // Удаляем второе
                    selectedSlot = null;
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                } else {
                    selectedSlot = i;
                }
            }
            renderGrid();
        }

        function updateUI() {
            document.getElementById('corn').innerText = corn;
            document.getElementById('egg-count').innerText = eggs.length;
            document.getElementById('main-score').innerText = eggs.length;
        }

        updateUI();
    </script>
</body>
