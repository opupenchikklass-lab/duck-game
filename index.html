<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #duck { width: 200px; border: 5px solid white; border-radius: 20px; }
        .counter { font-size: 50px; margin-top: 20px; }
    </style>
</head>
<body>
    <img id="duck" src="duck-dapper.png" alt="Duck">
    <div class="counter" id="score">0</div>

    <script>
        let score = 0;
        const duck = document.getElementById('duck');
        const scoreDisplay = document.getElementById('score');

        // Используем onclick - это самый надежный метод
        duck.onclick = function() {
            score++;
            scoreDisplay.innerText = score;
            // Вибрация, если доступна
            if (window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        };
    </script>
</body>
</html>
