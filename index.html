<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Game</title>
    <style>
        body { background: #0a0e17; color: white; margin: 0; font-family: sans-serif; text-align: center; }
        .stats { display: flex; justify-content: space-around; padding: 20px; background: #161b22; }
        #duck-btn { 
            font-size: 100px; margin-top: 50px; cursor: pointer; 
            user-select: none; transition: transform 0.1s;
            display: inline-block;
        }
        #duck-btn:active { transform: scale(0.9); }
        .lvl-info { margin-top: 20px; color: orange; font-weight: bold; }
        #inventory { display: none; padding: 20px; }
        .footer { position: fixed; bottom: 0; width: 100%; display: flex; background: #0f131a; }
        .nav { flex: 1; padding: 15px; cursor: pointer; opacity: 0.5; }
        .nav.active { opacity: 1; color: orange; }
    </style>
</head>
<body>

    <div class="stats">
        <div>🌽 <span id="corn">100</span></div>
        <div>🥚 <span id="eggs">0</span></div>
    </div>

    <div id="farm">
        <div class="lvl-info">LEVEL <span id="lvl">1</span> (<span id="fed">0</span>/1000)</div>
        <div id="duck-btn">🦆</div>
        <p>Нажимай на утку!</p>
    </div>

    <div id="inventory">
        <h3>ТВОИ ЯЙЦА</h3>
        <div id="items"></div>
    </div>

    <div class="footer">
        <div id="f-tab" class="nav active" onclick="tab('farm')">УТКА</div>
        <div id="i-tab" class="nav" onclick="tab('inv')">ЯЙЦА</div>
    </div>

    <script>
        let corn = 100, fed = 0, lvl = 1, eggs = [];
        const levels = [0, 1000, 2500, 4000, 8000, 20000, 30000];

        document.getElementById('duck-btn').onclick = function() {
            if (corn <= 0) { alert("Нет корма!"); return; }
            corn--; fed++;
            if (fed >= levels[lvl]) { lvl++; alert("НОВЫЙ УРОВЕНЬ!"); }
            if (eggs.length < 16) eggs.push(0);
            update();
        };

        function tab(t) {
            document.getElementById('farm').style.display = t === 'farm' ? 'block' : 'none';
            document.getElementById('inventory').style.display = t === 'inv' ? 'block' : 'none';
            document.getElementById('f-tab').classList.toggle('active', t === 'farm');
            document.getElementById('i-tab').classList.toggle('active', t === 'inv');
            if (t === 'inv') render();
        }

        function render() {
            const div = document.getElementById('items');
            div.innerHTML = '';
            eggs.forEach((e, i) => {
                const b = document.createElement('button');
                b.innerText = "ОТКРЫТЬ 🥚";
                b.onclick = () => {
                    let win = Math.random() < 0.05 ? 250 : 5;
                    corn += win;
                    eggs.splice(i, 1);
                    if (win > 5) alert("ДЖЕКПОТ! +250 🌽");
                    render(); update();
                };
                div.appendChild(b);
            });
        }

        function update() {
            document.getElementById('corn').innerText = corn;
            document.getElementById('eggs').innerText = eggs.length;
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('fed').innerText = fed;
        }
    </script>
</body>
</html>
