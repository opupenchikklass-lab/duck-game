<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Level Up</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0a0a0a; --card: #151515; }
        body { background: var(--bg); color: white; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; user-select: none; }
        
        .top-stats { display: flex; justify-content: space-around; padding: 20px; font-weight: bold; background: #111; border-bottom: 1px solid #222; }
        .main-balance { font-size: 40px; font-weight: 800; margin: 20px 0; letter-spacing: 1px; color: #fff; }

        .card-container {
            width: 85%; margin: 10px auto; background: var(--card); border-radius: 30px;
            padding: 25px; border: 1px solid #333; position: relative;
        }

        .rarity-tag { position: absolute; top: 20px; right: 25px; color: #2ecc71; font-size: 12px; font-weight: bold; }
        .lvl-tag { position: absolute; top: 20px; left: 25px; color: var(--gold); font-size: 14px; font-weight: bold; }

        /* УТКА И ЕЕ ОПЫТ */
        .duck-box { height: 180px; display: flex; align-items: center; justify-content: center; position: relative; margin-top: 20px; }
        .duck-img { width: 160px; transition: transform 0.1s; }
        .duck-img:active { transform: scale(0.95); }

        /* ПОЛОСКА УРОВНЯ (XP BAR) */
        .xp-container { width: 80%; margin: 15px auto; text-align: left; }
        .xp-text { font-size: 11px; color: #888; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .xp-bg { width: 100%; height: 8px; background: #000; border-radius: 4px; overflow: hidden; }
        .xp-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s ease; box-shadow: 0 0 10px var(--gold); }

        .btn-feed {
            width: 100%; background: var(--gold); border: none; padding: 18px;
            border-radius: 18px; color: black; font-weight: 900; font-size: 18px;
            cursor: pointer; margin-top: 10px;
        }
        
        /* Всплывающий текст */
        .floating-text {
            position: absolute; color: white; font-weight: bold; font-size: 22px;
            animation: floatUp 0.6s ease-out forwards; pointer-events: none;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-80px); }
        }
    </style>
</head>
<body>

    <div class="top-stats">
        <div>🌽 КОРМ: <span id="corn-ui">100</span></div>
        <div>💎 ⭐: 15</div>
    </div>

    <div class="main-balance" id="balance-ui">156.50</div>

    <div class="card-container">
        <div class="lvl-tag" id="lvl-label">LVL 4</div>
        <div class="rarity-tag">UNCOMMON</div>
        
        <div class="duck-box" onclick="spawnEffect(event)">
            <img src="duck-dapper.png" class="duck-img">
        </div>

        <div class="xp-container">
            <div class="xp-text">
                <span>ПРОГРЕС УРОВНЯ</span>
                <span id="xp-count">0/20</span>
            </div>
            <div class="xp-bg">
                <div class="xp-fill" id="xp-bar"></div>
            </div>
        </div>

        <button class="btn-feed" onclick="feedAction()">
            ТОРКНИСЬ І ГОДУЙ 🌽1
        </button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

            corn: 100,
            balance: 156.50,
            lvl: 4,
            xp: 0,
            xpNeeded: 20 // Сколько нужно корма для нового уровня
        };

        function feedAction() {
            if (state.corn <= 0) return;

            state.corn--;
            state.balance += 0.02;
            state.xp++;

            if (state.xp >= state.xp
