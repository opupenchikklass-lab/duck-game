<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Game: Feed & Egg</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; user-select: none; margin: 0; padding: 0; }
        .stats-container { display: flex; justify-content: center; gap: 15px; padding: 20px; font-weight: bold; }
        .stat-box { background: #2a2a2a; padding: 10px 15px; border-radius: 12px; border: 1px solid #444; min-width: 100px; }
        .duck-container { margin-top: 30px; cursor: pointer; transition: transform 0.1s; display: inline-block; }
        .duck-container:active { transform: scale(0.95); }
