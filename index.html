<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: Arial, sans-serif; user-select: none; margin: 0; padding-bottom: 50px; }
        .header { display: flex; justify-content: space-around; padding: 20px; background: #222; border-bottom: 2px solid #ffd700; font-size: 20px; font-weight: bold; }
        
        /* Сетка слотов - теперь с принудительным отображением */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-gap: 10px; 
            max-width: 320px; 
            margin: 30px auto; 
            padding: 10px;
        }
        .slot { 
            aspect-ratio: 1 / 1; 
            background: #333; 
            border-radius: 12px; 
            border: 2px solid #444; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 40px; 
            position: relative;
            min-height: 90px; /* Чтобы не схлопывались */
        }
        .slot.selected { border-color: #ffd700; box-shadow: 0 0 10px #ffd700; }
        .lvl { position: absolute; bottom: 5px; right: 5px; background: #ffd700; color: black; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        
        .btn-buy { background: #ffd700; color: black; border: none; padding: 20px 40px; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
        #status { color: #ffd700; margin: 15px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div>🌽 КОРМ: <span id="corn">100</span></div>
    <div>🥚 ЯЙЦА: <span id="eggs">0</span></div>
</div>

<div id="status">Нажми "Купить яйцо", чтобы заполнить слоты!</div>

<div class="grid" id="grid">
    </div>

<button class="btn-buy" onclick="buyEgg()">КУПИТЬ ЯЙЦО (5 🌽)</button>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let corn = 100;
    let eggsCounter = 0; 
    let slots = Array(9).fill(null);
    let selected = null;

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        slots.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'slot' + (selected === i ? ' selected' : '');
            div.onclick = () => handleClick(i);
            
            if (item) {
                div.innerHTML = item.type === 'egg' ? '🥚' : '🦆';
                if (item.type === 'duck') {
                    div.innerHTML += <div class="lvl">${item.lvl}</div>;
                }
            }
            grid.appendChild(div);
        });
        document.getElementById('corn').innerText = corn;
        document.getElementById('eggs').innerText = eggsCounter;
    }

    function buyEgg() {
        let idx = slots.findIndex(s => s === null);
        if (corn >= 5 && idx !== -1) {
            corn -= 5;
            slots[idx] = { type: 'egg', lvl: 0 };
            render();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }
    }

    function handleClick(i) {
        if (selected === null) {
            if (slots[i]) selected = i;
        } else {
            let s1 = slots[selected];
            let s2 = slots[i];

            if (selected !== i && s1 && s2 && s1.type === s2.type && s1.lvl === s2.lvl) {
                if (s1.type === 'egg') {
                    eggsCounter++;
                    let newLvl = 1;
                    let r = Math.random() * 10
