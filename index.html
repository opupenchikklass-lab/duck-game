<script>
    const tg = window.Telegram.WebApp;
    let corn = 100, fed = 0, lvl = 1, inv = [];
    let sel = null;

    const skins = ['🥚', '✨', '💎', '🏺', '👑', '🔥', '🌈', '🌙', '☀️', '💠'];
    const rewards = [5, 15, 40, 100, 250, 600, 1500, 4000, 10000, 25000];
    const jacks = [250, 750, 1250, 2500, 3000, 5000, 15000, 20000, 30000, 50000];

    // Клик по утке
    document.getElementById('duck-btn').onclick = () => {
        if (corn <= 0) { tg.showAlert("Корм кончился!"); return; }
        corn--; fed++;
        if (fed >= (lvl * 1000)) { lvl++; tg.showAlert("Новый уровень: " + lvl); }
        if (inv.length < 16) {
            inv.push(0);
            if (lvl === 1 && inv.length < 16) inv.push(0);
        }
        update();
        tg.HapticFeedback.impactOccurred('light');
    };

    function showTab(t) {

        document.getElementById('screen-inv').style.display = t === 'inv' ? 'flex' : 'none';
        document.getElementById('t-f').classList.toggle('active', t === 'farm');
        document.getElementById('t-i').classList.toggle('active', t === 'inv');
        if (t === 'inv') render();
    }

        const container = document.getElementById('grid');
        container.innerHTML = '';
        for (let i = 0; i < 16; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot' + (sel === i ? ' selected' : '');
            
            if (inv[i] !== undefined) {
                slot.innerHTML = <span class="lvl-tag">${inv[i]+1}</span>
                                  <span>${skins[inv[i]]}</span>
                                  <button class="open-btn" onclick="openEgg(event, ${i})">OPEN</button>;
                slot.onclick = () => select(i);
            }
            container.appendChild(slot);
        }

    function select(i) {
        if (sel === null) {
            sel = i;
        } else if (sel === i) {
            sel = null;
        } else {
            // ЛОГИКА СЛИЯНИЯ
            if (inv[sel] === inv[i] && inv[i] < 9) {
                inv[i]++; // Повышаем уровень того, на который нажали вторым
                inv.splice(sel, 1); // Удаляем первый
                sel = null;
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                sel = i; // Просто переключаем выбор
            }
        }
        render();
    }

    function openEgg(e, i) {
        e.stopPropagation();
        let isJack = Math.random() < 0.05;
        let win = isJack ? jacks[inv[i]] : rewards[inv[i]];
        corn += win;
        if (isJack) tg.showAlert("🔥 ДЖЕКПОТ! +" + win + " 🌽");
        inv.splice(i, 1);
        sel = null;
        update();
        render();
    }

    function update() {
        document.getElementById('corn').innerText = corn;
        document.getElementById('egg-count').innerText = inv.length;
        document.getElementById('lvl').innerText = lvl;

    }
    
    update();
