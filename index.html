<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e0e0e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .btn { background: #f1c40f; color: black; padding: 20px; width: 100%; border-radius: 15px; font-weight: bold; border: none; font-size: 18px; margin-top: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 20px; }
        .slot { aspect-ratio: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .bar-bg { width: 100%; height: 10px; background: #000; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: #f1c40f; width: 0%; }
    </style>
</head>
<body>

    <h2>156.50</h2>
    <p>🌽 КОРМ: <span id="c">1000</span></p>

    <div style="background: #151515; padding: 15px; border-radius: 20px;">
        <div class="bar-bg"><div id="f" class="bar-fill"></div></div>
        <div style="font-size: 10px;"><span id="x">0</span> / 1000 ДО РОСТУ</div>
        <button class="btn" onclick="tap()">ГОДУВАТИ 1</button>
    </div>

    <div class="grid" id="g"></div>

    <script>
        // Принудительная инициализация
        window.onload = () => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        };

        let state = { corn: 1000, xp: 0, taps: 0, slots: Array(16).fill(null) };

        function tap() {
            state.corn--;
            state.xp++;
            state.taps++;

            // Механика: 2 тапа = 1 яйцо
            if (state.taps % 2 === 0) {
                let empty = state.slots.indexOf(null);
                if (empty !== -1) state.slots[empty] = '🥚';
            }

            // Обновляем текст
            document.getElementById('c').innerText = state.corn;
            document.getElementById('x').innerText = state.xp;
            
            // Обновляем шкалу (1/1000)
            document.getElementById('f').style.width = (state.xp / 10) + '%';

            // Обновляем сетку 4x4
            const grid = document.getElementById('g');
            grid.innerHTML = '';
            state.slots.forEach(s => {
                let d = document.createElement('div');
                d.className = 'slot';
                d.innerText = s || '';
                grid.appendChild(d);
            });

            // Вибрация
            if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }

        // Рисуем пустую сетку при старте
        tap(); state.corn++; state.xp--; state.taps--; 
    </script>
</body>
</html>
