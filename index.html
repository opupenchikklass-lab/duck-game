<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Game Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js?5"></script>
    <style>
        body { background: #0a0e17; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .stats { font-size: 24px; margin-bottom: 20px; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px; }
        #duck-clicker { width: 250px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.05s; }
        #duck-clicker:active { transform: scale(0.95); }
        .nav { margin-top: 30px; display: flex; gap: 20px; }
        button { background: orange; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stats">🌽 <span id="corn-count">100</span></div>
    
    <div onclick="doTap()">
        <img id="duck-clicker" src="duck-dapper.png" alt="Duck">
    </div>

    <div class="nav">
        <button onclick="alert('Скоро: Инвентарь и Слияние!')">ЯЙЦЯ</button>
    </div>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        let count = 100;
        
        function doTap() {
            count--; // Уменьшаем корм
            document.getElementById('corn-count').innerText = count;
            
            // Вибрация (Haptic Feedback)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }
    </script>
</body>
</html>
