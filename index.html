<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Duck Game</title>
  <style>
    body {
      background: linear-gradient(#f9e79f, #f5cba7);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    #game {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    #cornCounter, #tokenCounter {
      position: absolute;
      right: 20px;
      border-radius: 25px;
      padding: 10px 20px;
      font-size: 20px;
      font-weight: bold;
    }
    #cornCounter {
      top: 20px;
      background: #fff3cd;
      border: 2px solid #f39c12;
    }
    #tokenCounter {
      top: 80px;
      background: #d4efdf;
      border: 2px solid #27ae60;
    }
    #duck {
      width: 200px;
      height: 200px;
      margin-top: 100px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    #duck:active {
      transform: scale(0.9);
    }
