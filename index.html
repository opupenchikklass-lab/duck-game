    <style>

        .lvl-box { width: 80%; text-align: center; margin-bottom: 20px; }
        .bar-bg { background: #222; height: 12px; border-radius: 6px; border: 1px solid #444; overflow: hidden; margin-top: 5px; }

        #duck-img { width: 220px; cursor: pointer; transition: transform 0.05s; }

<body>

    <div class="header">
        <div class="stat-item">🌽 <span id="ui-corn">100</span></div>
        <div class="stat-item">🥚 <span id="ui-eggs">0</span></div>
    </div>

    <div id="screen-farm">
        <div class="lvl-box">
            <b style="color:#ffa500">LEVEL <span id="ui-lvl">1</span></b>
            <div style="font-size:12px; color:#888"><span id="ui-fed">0</span> / <span id="ui-next">1000</span></div>
            <div class="bar-bg"><div id="bar-fill"></div></div>
        </div>
        <img id="duck-img" src="duck-dapper.png" onclick="handleTap()">
    </div>

    <div id="screen-merge" style="display:none">
        <h3 style="color:#ffa500">ИНВЕНТАРЬ</h3>
        <div class="grid" id="grid"></div>
    </div>

    <div class="footer">
        <div class="nav-item active" id="btn-farm" onclick="showTab('farm')">🦆<br>КАЧКИ</div>
        <div class="nav-item" id="btn-merge" onclick="showTab('merge')">🥚<br>ЯЙЦЯ</div>
    </div>

    <script>
        // Инициализация
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) tg.expand();

        let corn = 100;
        let totalFed = 0;
        let level = 1;
        let inventory = [];

        const levels = [0, 1000, 2500, 4000, 8000, 20000, 30000];
        const eggSkins = ['🥚', '✨', '💎', '🏺', '👑', '🔥', '🌈', '🌙', '☀️', '💠'];
        const rewards = [5, 15, 40, 100, 250, 600, 1500, 4000, 10000, 25000];
        const jackpots = [250, 750, 1250, 2500, 3000, 5000, 15000, 20000, 30000, 50000];

        function handleTap() {
            if (corn <= 0) {
                if (tg) tg.showAlert("Кукуруза кончилась! Открывай яйца.");
                return;
            }

            // 1. Уменьшаем корм
            corn--;
            totalFed++;
[22.03.2026 17:23] ❤️: // 2. Проверяем уровень
            if (totalFed >= levels[level] && level < 6) {
                level++;
                if (tg) tg.HapticFeedback.notificationOccurred('success');
            }

            // 3. Добавляем 2 яйца на 1 уровне
            if (inventory.length < 16) {
                inventory.push(0);
                if (level === 1 && inventory.length < 16) inventory.push(0);
            }

            // 4. Обновляем экран
            updateUI();
            if (tg) tg.HapticFeedback.impactOccurred('light');
        }

        function showTab(tab) {
            document.getElementById('screen-farm').style.display = tab === 'farm' ? 'flex' : 'none';
            document.getElementById('screen-merge').style.display = tab === 'merge' ? 'flex' : 'none';
            document.getElementById('btn-farm').classList.toggle('active', tab === 'farm');
            document.getElementById('btn-merge').classList.toggle('active', tab === 'merge');
            if (tab === 'merge') renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                if (inventory[i] !== undefined) {
                    slot.innerHTML = <span>${eggSkins[inventory[i]]}</span>
                                      <div class="open-btn" onclick="openEgg(event, ${i})">OPEN</div>;
                }
                container.appendChild(slot);
            }
        }

        function openEgg(e, index) {
            e.stopPropagation();
            const eggLvl = inventory[index];
            const isJackpot = Math.random() < 0.05; // 5% шанс
            const win = isJackpot ? jackpots[eggLvl] : rewards[eggLvl];

            corn += win;
            inventory.splice(index, 1);

            if (isJackpot && tg) {
                tg.showAlert("🔥 JACKPOT! +" + win + " 🌽");
            }

            updateUI();
            renderGrid();
        }

        function updateUI() {
            document.getElementById('ui-corn').innerText = corn;
            document.getElementById('ui-eggs').innerText = inventory.length;
            document.getElementById('ui-lvl').innerText = level;
            document.getElementById('ui-fed').innerText = totalFed;
            document.getElementById('ui-next').innerText = levels[level] || "MAX";
            
            const progress = (totalFed / levels[level]) * 100;
            document.getElementById('bar-fill').style.width = Math.min(progress, 100) + "%";
        }

        // Запуск
        updateUI();
    </script>
</body>
</html>
